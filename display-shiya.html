<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視野予約状況ディスプレイ - ふじみ野ひかり眼科 視野予約</title>
    <style>
        /* 全画面表示用のリセット */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            overflow: hidden;
        }

        .display-area {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ディスプレイ全体のスタイル */
        .display-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            text-align: center;
            color: white;
            transition: background-color 0.5s ease;
        }

        /* 予約可能の時のスタイル（濃い黄緑色） */
        .display-container.available {
            background: #27ae60;
        }

        /* 予約不可の時のスタイル（赤色） */
        .display-container.unavailable {
            background: #dc3545;
        }

        /* 読み込み中のスタイル */
        .display-container.loading {
            background: #6C757D;
        }

        /* クリニック名（使用しない） */
        .clinic-name {
            display: none;
        }

        /* アイコン */
        .icon {
            font-size: clamp(144px, 12vw, 200px);
            margin-bottom: 95px;
            margin-top: 80px;
            line-height: 1;
            animation: pulse 2s ease-in-out infinite;
            /* 白い縁取り効果 */
            text-shadow:
                -4px -4px 0 white,
                4px -4px 0 white,
                -4px 4px 0 white,
                4px 4px 0 white,
                0 -4px 0 white,
                0 4px 0 white,
                -4px 0 0 white,
                4px 0 0 white,
                -3px -3px 0 white,
                3px -3px 0 white,
                -3px 3px 0 white,
                3px 3px 0 white;
        }

        /* アイコンのパルスアニメーション */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
            }
        }

        /* メインメッセージ（空きあり/満枠） */
        .main-message {
            font-size: clamp(60px, 6vw, 120px);
            font-weight: 900;
            margin-bottom: 60px;
            line-height: 1.2;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in;
        }


        /* フェードインアニメーション */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* サブメッセージ */
        .sub-message {
            font-size: clamp(41px, 4.1vw, 56px);
            margin-bottom: 5px;
            line-height: 1.6;
            opacity: 0.95;
        }

        /* QRコードメッセージ */
        .qr-message {
            font-size: clamp(46px, 4.6vw, 64px);
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 60px;
            opacity: 0.95;
        }

        /* 更新時刻 */
        .update-time {
            font-size: clamp(30px, 3vw, 40px);
            opacity: 0.85;
            margin-top: 0;
        }

        /* エラー時のスタイル */
        .display-container.error {
            background: linear-gradient(135deg, #868E96 0%, #6C757D 100%);
        }

        .error-message {
            font-size: clamp(36px, 4vw, 72px);
            margin-top: 40px;
        }

        /* 昼休みバナー */
        .lunch-break-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: #ffc107;
            color: #212529;
            font-size: clamp(16px, 2.8vw, 32px);
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
            height: 115px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
        }

        .lunch-break-banner.show {
            display: block;
        }

        /* QRコード（左下固定） */
        .qr-code-corner {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1200;
        }

        .qr-code-corner img {
            display: block;
        }
    </style>
</head>
<body>
<div class="display-area">
    <!-- 営業時間前バナー -->
    <div id="openingSoonBanner" class="lunch-break-banner">
        10時に窓口が開きます　お待ち下さい
    </div>

    <!-- 昼休みバナー -->
    <div id="lunchBreakBanner" class="lunch-break-banner">
        昼休み中　午後３時より窓口が開きます
    </div>

    <!-- QRコード（左下固定） -->
    <!-- 注: 仮でQR_fujiminohikari.pngを使用。後でQR_Field_of_vision_reservation.pngに差し替え -->
    <div class="qr-code-corner">
        <img src="Downloads/QR_fujiminohikari.png" alt="視野予約QRコード">
    </div>

    <div id="displayContainer" class="display-container loading">
        <div class="clinic-name">ふじみ野ひかり眼科 視野予約</div>
        <div class="icon">⏳</div>
        <div class="main-message">読み込み中...</div>
        <div class="sub-message">視野予約状況を確認しています</div>
    </div>
</div>

<script>
    // スプレッドシートのID
    const SPREADSHEET_ID = '1RSd9aC5B_-gQ1_j5V1aQcZn1iVw9v8mpmhJ78_8gY80';

    // スプレッドシートのシート名（視野予約用）
    const SHEET_NAME = 'フォームの回答_視野予約';

    // Google Sheets APIのURL
    const API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

    const DISPLAY_CONFIG = {
        clinicName: 'ふじみ野ひかり眼科 視野予約',
        availableMsg: '{day}分の視野予約枠 「空き」あり',
        fullMsg: '{day}の視野予約は 「満枠」です',
        subMsg: '誠に恐れ入りますが、翌診療日以降で ご予約ください',
        qrMsg: '受付窓口 もしくは QRコードから ご予約ください',
        availableIcon: '⭕',
        fullIcon: '😔'
    };

    const FAVICON_CONFIG = {
        enabled: true,
        availableIcon: 'OK',
        availableColor: '#4CAF50',
        fullIcon: '✕',
        fullColor: '#F44336'
    };

    /**
     * 予約状況を取得して表示する関数
     */
    async function updateReservationStatus() {
        const container = document.getElementById('displayContainer');

        try {
            // スプレッドシートからデータを取得
            const response = await fetch(API_URL);
            const text = await response.text();

            // JSONデータを抽出（Google特有の形式）
            const json = JSON.parse(text.substring(47).slice(0, -2));

            // データの行を取得
            const rows = json.table.rows;

            if (rows.length === 0) {
                throw new Error('データがありません');
            }

            // 全ての行から最新のタイムスタンプを探す
            let latestRow = null;
            let latestDate = null;

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (row.c && row.c[0] && row.c[0].v) {
                    // タイムスタンプをDateオブジェクトに変換
                    const timestampStr = row.c[0].f || row.c[0].v;
                    const date = new Date(timestampStr);

                    if (!latestDate || date > latestDate) {
                        latestDate = date;
                        latestRow = row;
                    }
                }
            }

            if (!latestRow) {
                throw new Error('有効なデータがありません');
            }

            const timestamp = latestRow.c[0].f; // タイムスタンプ（フォーマット済み）
            const status = latestRow.c[1].v; // 予約状況（「空きあり」or「「満」」）

            // 予約可能かどうかを判定（「空きあり」が含まれているかチェック）
            const isAvailable = status.includes('空きあり');

            // ディスプレイを更新
            displayStatus(isAvailable, timestamp);

        } catch (error) {
            console.error('エラー:', error);
            displayError();
        }
    }

    /**
     * SVGファビコンを生成
     */
    function generateFaviconSVG(isAvailable) {
        const icon = isAvailable ? FAVICON_CONFIG.availableIcon : FAVICON_CONFIG.fullIcon;
        const color = isAvailable ? FAVICON_CONFIG.availableColor : FAVICON_CONFIG.fullColor;

        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
            <rect width="32" height="32" fill="${color}"/>
            <text x="16" y="16" font-size="20" text-anchor="middle" dominant-baseline="central" fill="white"
                font-family="Arial, sans-serif" font-weight="bold">${icon}</text>
        </svg>`;
    }

    /**
     * ファビコンを更新
     */
    function updateFavicon(isAvailable) {
        if (!FAVICON_CONFIG.enabled) {
            return;
        }

        const svg = generateFaviconSVG(isAvailable);
        const base64 = btoa(unescape(encodeURIComponent(svg)));
        const faviconUrl = `data:image/svg+xml;base64,${base64}`;

        let link = document.querySelector('link[rel="icon"]');
        if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/svg+xml';
            document.head.appendChild(link);
        }

        link.href = faviconUrl;
    }

    /**
     * タイムスタンプを「更新：YYYY/MM/DD HH:MM」形式にフォーマット
     */
    function formatTimestamp(timestampStr) {
        // スプレッドシートのタイムスタンプをパース
        const date = new Date(timestampStr);

        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');

        return `更新：${year}/${month}/${day} ${hours}:${minutes}`;
    }

    /**
     * 日付テキストを計算する関数
     */
    function calculateDayText(updateTime) {
        const now = new Date(updateTime);
        const dayOfWeek = now.getDay(); // 0=日, 1=月, 2=火, 3=水...
        const hour = now.getHours();
        const minute = now.getMinutes();
        const isAfter1830 = (hour > 18) || (hour === 18 && minute >= 30);

        let dayText = '本日';

        if (isAfter1830) {
            // 18:30以降

            // 月末チェック
            const lastDayOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            if (now.getDate() === lastDayOfMonth) {
                dayText = '翌営業日';
            } else if (dayOfWeek === 2) {
                // 火曜日
                dayText = '木曜';
            } else {
                dayText = '明日';
            }
        } else {
            // 18:30より前
            if (dayOfWeek === 3) {
                // 水曜日
                dayText = '木曜';
            } else {
                dayText = '本日';
            }
        }

        return dayText;
    }

    /**
     * 営業時間前判定関数（8:00-10:00、営業日のみ）
     */
    function isOpeningSoon(updateTime) {
        const now = new Date(updateTime);
        const dayOfWeek = now.getDay(); // 0=日, 1=月, 2=火, 3=水...
        const hour = now.getHours();

        // 水曜日（休診日）は表示しない
        if (dayOfWeek === 3) {
            return false;
        }

        // 8:00-9:59の間
        return hour >= 8 && hour < 10;
    }

    /**
     * 昼休み判定関数（13:30-15:00、営業日のみ）
     */
    function isLunchBreak(updateTime) {
        const now = new Date(updateTime);
        const dayOfWeek = now.getDay();
        const hour = now.getHours();
        const minute = now.getMinutes();

        // 水曜日（休診日）は表示しない
        if (dayOfWeek === 3) {
            return false;
        }

        // 13:30-15:00の間
        return (hour === 13 && minute >= 30) || (hour === 14);
    }

    /**
     * バナーの表示/非表示を更新
     */
    function updateBanners(updateTime) {
        const openingSoonBanner = document.getElementById('openingSoonBanner');
        const lunchBreakBanner = document.getElementById('lunchBreakBanner');

        // 営業時間前バナー
        if (isOpeningSoon(updateTime)) {
            openingSoonBanner.classList.add('show');
        } else {
            openingSoonBanner.classList.remove('show');
        }

        // 昼休みバナー
        if (isLunchBreak(updateTime)) {
            lunchBreakBanner.classList.add('show');
        } else {
            lunchBreakBanner.classList.remove('show');
        }
    }

    /**
     * ディスプレイを表示する関数
     */
    function displayStatus(isAvailable, updateTime) {
        const container = document.getElementById('displayContainer');

        // バナーを更新
        updateBanners(updateTime);

        // 日付テキストを計算
        const dayText = calculateDayText(updateTime);

        // タイムスタンプをフォーマット
        const formattedTime = formatTimestamp(updateTime);

        if (isAvailable) {
            // 予約可能（濃い黄緑色）
            container.className = 'display-container available';
            container.innerHTML = `
                <div class="clinic-name">${DISPLAY_CONFIG.clinicName}</div>
                <div class="icon">${DISPLAY_CONFIG.availableIcon}</div>
                <div class="main-message">${DISPLAY_CONFIG.availableMsg.replace('{day}', dayText)}</div>
                <div class="qr-message">${DISPLAY_CONFIG.qrMsg}</div>
                <div class="update-time">${formattedTime}</div>
            `;
        } else {
            // 予約不可（赤色）
            container.className = 'display-container unavailable';
            container.innerHTML = `
                <div class="clinic-name">${DISPLAY_CONFIG.clinicName}</div>
                <div class="icon">${DISPLAY_CONFIG.fullIcon}</div>
                <div class="main-message">${DISPLAY_CONFIG.fullMsg.replace('{day}', dayText)}</div>
                <div class="sub-message">${DISPLAY_CONFIG.subMsg}</div>
                <div class="qr-message">${DISPLAY_CONFIG.qrMsg}</div>
                <div class="update-time">${formattedTime}</div>
            `;
        }

        updateFavicon(isAvailable);
    }

    /**
     * エラー表示する関数
     */
    function displayError() {
        const container = document.getElementById('displayContainer');
        container.className = 'display-container error';
        container.innerHTML = `
            <div class="clinic-name">ふじみ野ひかり眼科 視野予約</div>
            <div class="icon">⚠️</div>
            <div class="main-message">情報を取得できません</div>
            <div class="error-message">しばらくしてから再度お試しください</div>
        `;

        updateFavicon(false);
    }

    // ページ読み込み時に実行
    updateFavicon(true);
    updateReservationStatus();

    // 1分ごとに自動更新（60000ミリ秒 = 1分）
    setInterval(updateReservationStatus, 60000);
</script>

</body>
</html>

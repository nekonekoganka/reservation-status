<!-- 予約状況バナー - ホームページ埋め込み用コード -->
<style>
    /* バナーのスタイル */
    .reservation-banner {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        cursor: pointer;
    }

    /* バナーのリンクスタイル */
    .banner-link {
        text-decoration: none;
        display: block;
        color: inherit;
    }

    .banner-link:hover .reservation-banner {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    /* 予約可能の時のスタイル */
    .reservation-banner.available {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    /* 予約不可の時のスタイル */
    .reservation-banner.unavailable {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
    }

    /* 読み込み中のスタイル */
    .reservation-banner.loading {
        background: linear-gradient(135deg, #a8b8d8 0%, #c8d0e7 100%);
        color: #333;
    }

    /* メインメッセージ */
    .reservation-banner h2 {
        margin: 0 0 10px 0;
        font-size: 28px;
        font-weight: bold;
    }

    /* サブメッセージ */
    .reservation-banner p {
        margin: 5px 0;
        font-size: 16px;
        opacity: 0.9;
    }

    /* 更新時刻 */
    .reservation-banner .update-time {
        margin-top: 15px;
        font-size: 14px;
        opacity: 0.8;
    }

    /* エラーメッセージ */
    .reservation-banner.error {
        background: #f5f5f5;
        color: #666;
        border: 2px dashed #ccc;
    }

    /* スマホ対応 */
    @media (max-width: 600px) {
        .reservation-banner {
            margin: 10px;
            padding: 15px;
        }
        
        .reservation-banner h2 {
            font-size: 22px;
        }
        
        .reservation-banner p {
            font-size: 14px;
        }
    }
</style>

<!-- 予約状況バナー -->
<a href="https://ckreserve.com/clinic/fujiminohikari-ganka" target="_blank" class="banner-link">
    <div id="reservationBanner" class="reservation-banner loading">
        <h2>読み込み中...</h2>
        <p>予約状況を確認しています</p>
    </div>
</a>

<script>
    // スプレッドシートのID
    const SPREADSHEET_ID = '1XRi1YeaMX0DtH-3WbK8jV_EbeGiIHi37kmXvFTGZo1A';
    
    // スプレッドシートのシート名
    const SHEET_NAME = 'フォームの回答 1';
    
    // Google Sheets APIのURL
    const API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

    /**
     * 予約状況を取得して表示する関数
     */
    async function updateReservationStatus() {
        const banner = document.getElementById('reservationBanner');
        
        try {
            // スプレッドシートからデータを取得
            const response = await fetch(API_URL);
            const text = await response.text();
            
            // JSONデータを抽出
            const json = JSON.parse(text.substring(47).slice(0, -2));
            
            // データの行を取得
            const rows = json.table.rows;
            
            if (rows.length === 0) {
                throw new Error('データがありません');
            }
            
            // 最新の回答（最後の行）を取得
            const lastRow = rows[rows.length - 1];
            const timestamp = lastRow.c[0].f; // タイムスタンプ
            const status = lastRow.c[1].v; // 予約状況（「空きあり」or「「満」」）
            
            // 現在時刻を取得
            const now = new Date();
            const currentHour = now.getHours();
            
            // 18時以降かどうかを判定
            const isAfter18 = currentHour >= 18;
            
            // 予約可能かどうかを判定（「空きあり」が含まれているかチェック）
            const isAvailable = status.includes('空きあり');
            
            // バナーを更新
            displayBanner(isAvailable, isAfter18, timestamp);
            
        } catch (error) {
            console.error('エラー:', error);
            displayError();
        }
    }

    /**
     * バナーを表示する関数
     */
    function displayBanner(isAvailable, isAfter18, updateTime) {
        const banner = document.getElementById('reservationBanner');
        
        // 「今日」か「明日」を判定
        const dayText = isAfter18 ? '明日' : '本日';
        
        if (isAvailable) {
            // 予約可能
            banner.className = 'reservation-banner available';
            banner.innerHTML = `
                <h2>✅ ${dayText}予約可能</h2>
                <p>ご予約いただけます</p>
                <div class="update-time">最終更新: ${updateTime}</div>
            `;
        } else {
            // 予約不可
            banner.className = 'reservation-banner unavailable';
            banner.innerHTML = `
                <h2>❌ ${dayText}満員</h2>
                <p>申し訳ございません。予約枠がいっぱいです</p>
                <div class="update-time">最終更新: ${updateTime}</div>
            `;
        }
    }

    /**
     * エラー表示する関数
     */
    function displayError() {
        const banner = document.getElementById('reservationBanner');
        banner.className = 'reservation-banner error';
        banner.innerHTML = `
            <h2>⚠️ 情報を取得できません</h2>
            <p>しばらくしてから再度お試しください</p>
        `;
    }

    // ページ読み込み時に実行
    updateReservationStatus();
    
    // 1分ごとに自動更新（60000ミリ秒 = 1分）
    setInterval(updateReservationStatus, 60000);
</script>
